// Cloud save helper (debounce 1.5s)
const cloudSaveTimers = {};
function saveToCloud(uid, key, value) {
  if (!fbDb || !uid) return;
  clearTimeout(cloudSaveTimers[key]);
  cloudSaveTimers[key] = setTimeout(() => {
    fbDb.collection('users').doc(uid).set({ [key]: value }, { merge: true })
      .catch(e => console.warn('Firestore write:', e.message));
  }, 1500);
}
async function loadFromCloud(uid) {
  if (!fbDb || !uid) return null;
  try {
    const snap = await fbDb.collection('users').doc(uid).get();
    return snap.exists ? snap.data() : null;
  } catch(e) { console.warn('Firestore read:', e.message); return null; }
}

// ── QuickFS + server.py ────────────────────────────────────────────
// QuickFS 무료 키 발급: https://quickfs.net (500 calls/month, 캐시 7일로 충분)
// 키는 아래 ⚙️ 설정에서 입력하거나 server.py 상단 QFS_API_KEY 에 직접 입력
const getQFSKey  = () => localStorage.getItem("qfs_api_key") || "";
const PROXY      = "";  // server.py (localhost:8000) 사용

// QFS 키를 헤더로 전달하는 공통 fetch 헬퍼
const apiFetch = async (url, opts = {}) => {
  const key = getQFSKey();
  const headers = { "Accept": "application/json", ...(opts.headers || {}) };
  if (key) headers["X-QFS-Key"] = key;
  const res = await fetch(url, { ...opts, headers });
  return res;
};

// ── 주식 스냅샷 (QuickFS 펀더멘털 + yfinance 가격) via server.py ──
const fetchYF = async ticker => {
  const res = await apiFetch(`${PROXY}/yf?ticker=${encodeURIComponent(ticker)}`);
  if (!res.ok) {
    let msg = "HTTP " + res.status;
    try { const j = await res.json(); if (j.error) msg = j.error; } catch(e) {}
    throw new Error(msg);
  }
  const json = await res.json();
  if (json.quoteSummary?.error) throw new Error(json.quoteSummary.error.description || "서버 오류");
  return json.quoteSummary.result[0];  // { quote, km, inc, incPrev, cf, cfPrev, bs }
};

// ── 섹터별 DCF 파라미터 설정 ──────────────────────────────────────
// growthFloor: 최소성장률 | growthCap: 최대성장률
// termLow/Mid/High: ROIC에 따라 선택 (ROIC<15% / 15-25% / >25%)
const SECTOR_DCF_CONFIG = {
  "Technology":             { growthFloor:0.07, growthCap:0.15, termLow:22, termMid:28, termHigh:35 },
  "Communication Services": { growthFloor:0.05, growthCap:0.12, termLow:18, termMid:23, termHigh:28 },
  "Consumer Discretionary": { growthFloor:0.05, growthCap:0.12, termLow:16, termMid:20, termHigh:25 },
  "Consumer Defensive":     { growthFloor:0.03, growthCap:0.08, termLow:16, termMid:19, termHigh:22 },
  "Healthcare":             { growthFloor:0.04, growthCap:0.10, termLow:18, termMid:22, termHigh:26 },
  "Financial Services":     { growthFloor:0.03, growthCap:0.08, termLow:12, termMid:15, termHigh:18 },
  "Energy":                 { growthFloor:0.02, growthCap:0.08, termLow:10, termMid:13, termHigh:16 },
  "Industrials":            { growthFloor:0.04, growthCap:0.10, termLow:15, termMid:18, termHigh:21 },
  "Materials":              { growthFloor:0.03, growthCap:0.08, termLow:12, termMid:15, termHigh:18 },
  "Basic Materials":        { growthFloor:0.03, growthCap:0.08, termLow:12, termMid:15, termHigh:18 },
  "Real Estate":            { growthFloor:0.03, growthCap:0.07, termLow:14, termMid:17, termHigh:20 },
  "Utilities":              { growthFloor:0.02, growthCap:0.06, termLow:13, termMid:16, termHigh:18 },
};
const DCF_SECTOR_DEFAULT = { growthFloor:0.04, growthCap:0.10, termLow:16, termMid:20, termHigh:24 };

// ── 섹터 오버라이드: yfinance 분류 오류 수동 보정 ──────────────────
// TSLA: yfinance가 Consumer Cyclical/Discretionary로 분류하지만 실질적 기술주
const SECTOR_OVERRIDE = {
  "TSLA": "Technology",   // EV + FSD + Dojo AI + Energy Storage → 기술주 멀티플 적용
};

// ── 2단계 DCF (Bill Ackman 스타일, 섹터별 멀티플) ────────────────
// Stage 1 (Y1-5): 전체 성장률  |  Stage 2 (Y6-10): 절반 감속
// Terminal: 섹터+ROIC 기반 exit multiple (10~35x)
// Discount Rate: 10%
// ※ shares < 1백만 = 데이터 오류 → null 반환
// ----------------------------------------------------------------
const calcDCF = (fcf, growthRate = 0.08, discountRate = 0.10, exitMultiple = 25, years = 10, shares) => {
  if (!fcf || fcf <= 0 || !shares || shares < 1e6) return null;
  const stage1Years = 5;
  const stage2Growth = Math.max(growthRate / 2, 0.02);
  let totalPV = 0, fcfY = fcf;

  for (let i = 1; i <= stage1Years; i++) {
    fcfY *= (1 + growthRate);
    totalPV += fcfY / Math.pow(1 + discountRate, i);
  }
  for (let i = stage1Years + 1; i <= years; i++) {
    fcfY *= (1 + stage2Growth);
    totalPV += fcfY / Math.pow(1 + discountRate, i);
  }
  const pvTerminal = (fcfY * exitMultiple) / Math.pow(1 + discountRate, years);
  return Math.round((totalPV + pvTerminal) / shares);
};

// ── MAP YAHOO FINANCE DATA → STOCK OBJECT ────────────────────
const mapYFToStock = (ticker, data, chartData) => {
  const { quote = {}, km = {}, inc = {}, incPrev = null, cf = {}, cfPrev = null, bs = {}, _growth = {} } = data || {};

  const price             = quote.price || 0;
  const marketCap         = quote.marketCap || 0;
  // shares 최소 1M 보장 — 1 이하이면 데이터 오류 (DCF null 처리됨)
  const sharesOutstanding = (quote.sharesOutstanding > 1e6) ? quote.sharesOutstanding
    : (marketCap > 0 && price > 0 ? marketCap / price : 0);
  const pe                = quote.pe || km.peRatio || 0;
  const eps               = quote.eps || 0;

  // P&L
  const totalRevenue  = inc.revenue || 0;
  const revenuePrev   = incPrev?.revenue || 0;
  const grossProfit   = inc.grossProfit || 0;
  const ebit          = inc.operatingIncome || 0;
  const netIncome     = inc.netIncome || 0;

  // Cash flow
  const operatingCF   = cf.operatingCashFlow || 0;
  const totalCapex    = Math.abs(cf.capitalExpenditure || 0);
  const _fcfRaw       = cf.freeCashFlow || (operatingCF - totalCapex) || 0;
  // 은행 등 전통 FCF 미보고 업종 폴백 (JPM 등):
  // 서버가 freeCashflow=0, operatingCF=0 모두 반환 시 → netIncome×0.7 → eps×shares×0.7 순으로 시도
  const _netIncomeTmp = inc.netIncome || 0;
  const freeCashflow  = _fcfRaw > 0 ? _fcfRaw
    : (_netIncomeTmp > 0 ? _netIncomeTmp * 0.7
    : (eps > 0 && sharesOutstanding > 1e6 ? eps * sharesOutstanding * 0.7 : 0));
  const fcfPrev       = cfPrev?.freeCashFlow || 0;

  // Balance sheet
  const totalDebt     = bs.totalDebt || 0;
  const totalEquity   = bs.totalEquity || 1;
  const totalAssets   = bs.totalAssets || 1;
  const totalCashBal  = bs.cashAndCashEquivalents || 0;
  const bookValue     = bs.bookValuePerShare || (sharesOutstanding > 1e6 ? totalEquity / sharesOutstanding : 0) || 0;
  const enterpriseValue = km.enterpriseValue || (marketCap + totalDebt - totalCashBal) || marketCap;
  const peg           = 0; // FMP key-metrics doesn't include PEG in free tier

  // Ratios — prefer FMP key-metrics, fall back to self-calculated
  const roe           = km.roe       != null ? km.roe * 100       : (totalEquity > 0 ? netIncome / totalEquity * 100 : 0);
  const grossMargin   = totalRevenue > 0 ? grossProfit / totalRevenue * 100 : 0;
  const fcfYield      = km.freeCashFlowYield != null ? km.freeCashFlowYield * 100 : (marketCap > 0 && freeCashflow > 0 ? freeCashflow / marketCap * 100 : 0);
  const debtToEquity  = km.debtToEquity != null ? km.debtToEquity : (totalEquity > 0 ? totalDebt / totalEquity : 0);
  // safeShares는 아래 DCF 섹션에서 정의됨 — 여기선 sharesOutstanding 직접 사용하되 0 방어
  const fcfPerShare   = freeCashflow > 0 && sharesOutstanding > 1e6 ? freeCashflow / sharesOutstanding : 0;
  const pFcf          = km.pfcfRatio || (marketCap > 0 && freeCashflow > 0 ? marketCap / freeCashflow : 0);
  const ownerEarningsYield = marketCap > 0 && freeCashflow > 0 ? freeCashflow * 0.85 / marketCap * 100 : 0;
  const evEbit        = km.enterpriseValueOverEBITDA || (enterpriseValue > 0 && ebit > 0 ? enterpriseValue / ebit : 0);
  const taxRate       = 0.21;
  const invested      = totalEquity + totalDebt;
  const roic          = km.roic != null ? km.roic * 100 : (invested > 0 ? ebit * (1 - taxRate) / invested * 100 : 0);

  // Growth — incPrev/cfPrev 있으면 실제 계산, 없으면 서버 yfinance growth 필드 폴백
  const revenueGrowthCalc  = revenuePrev > 0 && totalRevenue > 0 ? (totalRevenue - revenuePrev) / revenuePrev : null;
  const revenueGrowth      = revenueGrowthCalc !== null ? revenueGrowthCalc : (_growth.revenueGrowth || 0);
  const earningsGrowth     = fcfPrev > 0 && freeCashflow > 0 ? (freeCashflow - fcfPrev) / fcfPrev : (_growth.earningsGrowth || 0);

  // 6-month momentum from Yahoo chart
  let mom6m = 0;
  if (chartData?.indicators?.quote?.[0]?.close) {
    const closes = chartData.indicators.quote[0].close.filter(Boolean);
    if (closes.length >= 2) mom6m = (closes[closes.length - 1] - closes[0]) / closes[0] * 100;
  }

  // ── 섹터별 2단계 DCF (Bill Ackman 스타일) ───────────────────────
  // SECTOR_OVERRIDE 우선 확인 → yfinance 섹터 → Unknown
  const rawSector  = data?._sector || "Unknown";
  const sectorKey  = SECTOR_OVERRIDE[ticker.toUpperCase()] || rawSector;
  const dcfCfg     = SECTOR_DCF_CONFIG[sectorKey] || DCF_SECTOR_DEFAULT;

  // 1. 성장률: 매출성장 × 60%, 섹터별 floor/cap 적용
  const growthInput = revenueGrowth !== 0 ? revenueGrowth
    : (earningsGrowth !== 0 ? earningsGrowth * 0.7 : 0);
  const conservativeGrowth = growthInput > 0
    ? Math.min(Math.max(growthInput * 0.60, dcfCfg.growthFloor), dcfCfg.growthCap)
    : dcfCfg.growthFloor + 0.01;  // 데이터 없거나 마이너스 → floor + 1%
  const cappedGrowthRate = conservativeGrowth;
  const blendedGrowth    = conservativeGrowth;

  // 2. 섹터 + ROIC 기반 터미널 배수
  const roicPct    = roic;
  const terminalMult = roicPct > 25 ? dcfCfg.termHigh
                     : roicPct > 15 ? dcfCfg.termMid
                     : dcfCfg.termLow;

  // 3. FCF 정규화: FCF/OCF < 40% 면 OCF × 65% 사용 (capex 투자단계 기업)
  const discountRate  = 0.10;
  const fcfOcfRatio   = operatingCF > 0 && freeCashflow > 0 ? freeCashflow / operatingCF : 1;
  const normalizedFCF = (fcfOcfRatio < 0.40 && operatingCF > 0)
    ? Math.max(freeCashflow, operatingCF * 0.65)
    : (freeCashflow > 0 ? freeCashflow : (operatingCF > 0 ? operatingCF * 0.65 : 0));
  const dcfFCF = normalizedFCF > 0 ? normalizedFCF : 0;

  // shares=0 방어: FCF/sharesOutstanding 계산에서 Infinity 방지
  const safeShares = sharesOutstanding > 1e6 ? sharesOutstanding : 0;

  const netCashPerShare = safeShares > 1e6 ? Math.max(0, totalCashBal - totalDebt) / safeShares : 0;
  const dcfBase      = calcDCF(dcfFCF, cappedGrowthRate, discountRate, terminalMult, 10, safeShares);

  // 비현실적 DCF 필터: 현재가의 0.1배 미만 or 100배 초과 → 데이터 오류로 null 처리
  const dcfRaw = dcfBase != null ? Math.round(dcfBase + netCashPerShare) : null;
  const dcfIntrinsic = (dcfRaw != null && price > 0 && dcfRaw > price * 0.05 && dcfRaw < price * 100)
    ? dcfRaw : null;

  return {
    ticker: ticker.toUpperCase(),
    name:   quote.name || ticker,
    sector: sectorKey,   // SECTOR_OVERRIDE 적용된 섹터 표시
    price:  parseFloat(price.toFixed(2)),
    fcfPerShare:         parseFloat(fcfPerShare.toFixed(2)),
    roe:                 parseFloat(roe.toFixed(1)),
    debtToEquity:        parseFloat(debtToEquity.toFixed(2)),
    fcfYield:            parseFloat(fcfYield.toFixed(2)),
    roic:                parseFloat(roic.toFixed(1)),
    pe:                  parseFloat((pe || 0).toFixed(1)),
    dcfIntrinsic,
    fcfPerShareGrowth:   parseFloat((blendedGrowth * 100).toFixed(1)),
    moatRating:          3,
    grossMargin:         parseFloat(grossMargin.toFixed(1)),
    evEbit:              parseFloat(evEbit.toFixed(1)),
    pFcf:                parseFloat(pFcf.toFixed(1)),
    ownerEarningsYield:  parseFloat(ownerEarningsYield.toFixed(2)),
    peg:                 parseFloat((peg || 0).toFixed(2)),
    eps:                 parseFloat((eps || 0).toFixed(2)),
    bookValue:           parseFloat((bookValue || 0).toFixed(2)),

              williamsR:    mapped.williamsR    || -50,
              williamsAD:   mapped.williamsAD   || "neutral",
              momentum:     mapped.momentum     || "neutral",
              sentimentWSI: mapped.sentimentWSI || 50,
              cotIndex:     mapped.cotIndex     || 50,
              seasonal:     mapped.seasonal     || "neutral",
              pricePattern: mapped.pricePattern || "neutral",
            };
          } catch(e) { return null; }
        })
      );
      for (const res of settled) {
        if (res.status === "fulfilled" && res.value && res.value.price > 0) {
          const mapped = res.value;
          const val = scoreMultiValuation(mapped);
          const qual = scoreQuality(mapped);
          const q2 = scoreQuant(mapped);
          const composite = computeComposite(val, qual, q2);
          const sellSignals = detectSellSignals(mapped);
          const tier = getTier(composite, sellSignals);
          const mos = (mapped.dcfIntrinsic > 0 && mapped.price > 0)
            ? ((mapped.dcfIntrinsic - mapped.price) / mapped.dcfIntrinsic * 100).toFixed(1)
            : null;
          results.push({ ...mapped, valScore: val, qualScore: qual, quantScore: q2, composite, sellSignals, tier, mos, fcfPS: calcFcfPerShare(mapped) });
        }
      }
      setScanResults([...results]);
      setScanProgress(Math.min(i + BATCH_SIZE, UNIVERSE.length));
      if (i + BATCH_SIZE < UNIVERSE.length && !cancelRef.current) await new Promise(r => setTimeout(r, 500));
    }
    setScanState("complete");
  };

  const stopScan = () => { cancelRef.current = true; };

  useEffect(() => {
    if (initialSig && !autoStarted.current && scanState === "idle") {
      autoStarted.current = true;
      startScan();
    }
  }, []);

  const filtered = useMemo(() => {
    let arr = scanResults;
    if (sigFilt !== "All") arr = arr.filter(s => s.tier.tier === sigFilt);
    if (capFilt !== "All") arr = arr.filter(s => {
      const mc = s._meta?.marketCap || 0;
      if (capFilt === "Mega") return mc >= 200e9;
      if (capFilt === "Large") return mc >= 10e9 && mc < 200e9;
      if (capFilt === "Mid") return mc > 0 && mc < 10e9;
      return true;
    });
    if (secFilt !== "All") arr = arr.filter(s => s.sector === secFilt);
    if (mosFilt !== "All") arr = arr.filter(s => {
      const m = parseFloat(s.mos);
      if (mosFilt === ">30") return m > 30;
      if (mosFilt === ">20") return m > 20;
      if (mosFilt === ">10") return m > 10;
      if (mosFilt === ">0") return m > 0;
      return true;
    });
    if (peFilt !== "All") arr = arr.filter(s => {
      if (!s.pe || s.pe <= 0) return false;
      if (peFilt === "<15") return s.pe < 15;
      if (peFilt === "<20") return s.pe < 20;
      if (peFilt === "<25") return s.pe < 25;
      return true;
    });
    if (deFilt !== "All") arr = arr.filter(s => {
      if (deFilt === "<0.5") return (s.debtToEquity || 0) < 0.5;
      if (deFilt === "<1.0") return (s.debtToEquity || 0) < 1.0;
      return true;
    });
    return [...arr].sort((a, b) => {
      if (uSort === "mos") return parseFloat(b.mos) - parseFloat(a.mos);
      if (uSort === "value") return b.valScore.total - a.valScore.total;
      if (uSort === "quality") return b.qualScore.total - a.qualScore.total;
      if (uSort === "pe") return (a.pe > 0 ? a.pe : 999) - (b.pe > 0 ? b.pe : 999);
      return b.composite - a.composite;
    });
  }, [scanResults, sigFilt, capFilt, secFilt, mosFilt, peFilt, deFilt, uSort]);

  const sectors = useMemo(() => {
    const s = new Set(scanResults.map(r => r.sector).filter(Boolean));
    return ["All", ...Array.from(s).sort()];
  }, [scanResults]);

  const counts = useMemo(() => {
    const c = { total: scanResults.length, strongBuy: 0, buy: 0, neutral: 0, sell: 0 };
    scanResults.forEach(s => {
      if (s.tier.tier === "Strong Buy") c.strongBuy++;
      else if (s.tier.tier === "Buy") c.buy++;
      else if (s.tier.tier === "Neutral") c.neutral++;
      else c.sell++;
    });
    return c;
  }, [scanResults]);

  const pct = UNIVERSE.length > 0 ? Math.round(scanProgress / UNIVERSE.length * 100) : 0;
  const CE = React.createElement;

  const FSel = (label, val, setter, opts) => CE("div", { key: label, style: { display: "flex", gap: 4, alignItems: "center" } },
    CE("span", { style: { fontSize: 10, color: C.textDim, textTransform: "uppercase", whiteSpace: "nowrap" } }, label + ":"),
    CE("select", { value: val, onChange: e => setter(e.target.value), style: { padding: "4px 6px", borderRadius: 6, border: "1px solid " + C.border, background: C.card, fontSize: 11, cursor: "pointer" } },
      opts.map(o => CE("option", { key: o, value: o }, o)))
  );

  return CE(React.Fragment, null,
    CE(Card, { style: { marginBottom: 16, padding: 16 } },
      CE("div", { style: { display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" } },
        CE("div", { style: { flex: 1, minWidth: 200 } },
          CE("div", { style: { fontWeight: 700, fontSize: 14, color: C.navy, marginBottom: 3 } },
            L ? "전체 미국 시장 스캔 (Universe Scanner)" : "Full US Market Scanner (Universe)"),
          CE("div", { style: { fontSize: 11, color: C.textDim } },
            L ? `S&P 500 주요 종목 ${UNIVERSE.length}개 — 5개씩 배치로 실시간 스캔` : `${UNIVERSE.length} major S&P 500 stocks — real-time batch scan (5 at a time)`)
        ),
        scanState !== "scanning" ?
          CE("button", { onClick: startScan, style: { padding: "8px 22px", borderRadius: 8, border: "none", background: "linear-gradient(135deg," + C.gold + "," + C.goldBright + ")", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", letterSpacing: 0.5 } },
            scanResults.length > 0 ? (L ? "🔄 재스캔" : "🔄 Re-Scan") : (initialSig ? (L ? "▶ " + initialSig + " 신호 스캔 시작" : "▶ Scan for " + initialSig) : (L ? "▶ 스캔 시작" : "▶ Start Scan"))) :
          CE("button", { onClick: stopScan, style: { padding: "8px 22px", borderRadius: 8, border: "none", background: C.crimson, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" } },
            L ? "■ 중지" : "■ Stop"),
        scanState === "scanning" && CE("div", { style: { minWidth: 170 } },
          CE("div", { style: { fontSize: 11, color: C.textDim, marginBottom: 4 } }, `${scanProgress} / ${UNIVERSE.length}  (${pct}%)`),
          CE("div", { style: { height: 7, background: C.border, borderRadius: 4, overflow: "hidden" } },
            CE("div", { style: { height: "100%", width: pct + "%", background: "linear-gradient(90deg," + C.gold + "," + C.goldBright + ")", transition: "width 0.5s ease", borderRadius: 4 } })
          )
        ),
        scanState === "complete" && CE("span", { style: { fontSize: 12, color: C.emerald, fontWeight: 700 } },
          `✓ ${L ? "완료" : "Complete"} — ${counts.total} ${L ? "종목 스캔됨" : "stocks scanned"}`)
      ),
      scanError && CE("div", { style: { marginTop: 10, padding: "10px 14px", borderRadius: 8, background: "#fee2e2", border: "1px solid #fca5a5", color: "#b91c1c", fontSize: 12, fontWeight: 600 } }, scanError)
    ),
    scanResults.length > 0 && CE("div", { style: { display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10, marginBottom: 16 } },
      ...[
        [L ? "전체" : "Total", counts.total, C.navy],
        [L ? "강력매수" : "Strong Buy", counts.strongBuy, C.emerald],

        CE("div", { style: { fontSize: 10, color: C.textDim, marginTop: 4 } }, lbl)

    ),
    scanResults.length > 0 && CE(Card, { style: { marginBottom: 14, padding: 12 } },

      CE("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 12 } },

          CE("tr", { style: { borderBottom: "2px solid " + C.border, background: C.goldBg, position: "sticky", top: 0, zIndex: 2 } },

              L ? "종합점수" : "Score", L ? "신호" : "Signal"

            filtered.map((s, i) => {
              const mc = s._meta?.marketCap || 0;
              const mcStr = mc >= 1e12 ? "$" + (mc / 1e12).toFixed(1) + "T" : mc >= 1e9 ? "$" + (mc / 1e9).toFixed(0) + "B" : mc > 0 ? "$" + (mc / 1e6).toFixed(0) + "M" : "—";

              },
                CE("td", { style: { padding: "9px 8px", color: C.textDim, fontSize: 11 } }, i + 1),
                CE("td", { style: { padding: "9px 8px", fontWeight: 700, color: C.navy } }, s.ticker),
                CE("td", { style: { padding: "9px 8px", fontSize: 11, color: C.textMuted } }, s.sector || "—"),
                CE("td", { style: { padding: "9px 8px", fontSize: 11, color: C.textDim } }, mcStr),
                CE("td", { style: { padding: "9px 8px", fontWeight: 600 } }, s.price > 0 ? "$" + s.price.toFixed(2) : "—"),
                CE("td", { style: { padding: "9px 8px", color: s.dcfIntrinsic > 0 ? C.gold : (s.fcfPerShare === 0 ? C.crimson : C.textMuted), fontWeight: 600, fontSize: !s.dcfIntrinsic ? 10 : undefined } }, s.dcfIntrinsic > 0 ? "$" + s.dcfIntrinsic : (s.fcfPerShare === 0 ? "현금창출없음" : "FCF 기준 부적합")),
                CE("td", { style: { padding: "9px 8px", color: mosColor, fontWeight: 700 } }, isFinite(mosNum) ? mosNum.toFixed(1) + "%" : "—"),
                CE("td", { style: { padding: "9px 8px", color: C.textMid } }, s.pe > 0 ? s.pe.toFixed(1) + "x" : "—"),
                CE("td", { style: { padding: "9px 8px", color: (s.debtToEquity || 0) > 1 ? C.crimson : C.textMid } }, typeof s.debtToEquity === "number" ? s.debtToEquity.toFixed(2) : "—"),
                CE("td", { style: { padding: "9px 8px", fontWeight: 800, color: s.tier.color, fontSize: 14 } }, s.composite),
                CE("td", { style: { padding: "9px 8px" } },
                  CE("span", { style: { padding: "3px 9px", borderRadius: 5, background: s.tier.color + "20", color: s.tier.color, fontSize: 10, fontWeight: 700, whiteSpace: "nowrap" } },
                    s.tier.tier))
              );
            })
        )
      )
    ),
    uSelected && CE(StockDetail, { stock: uSelected, onClose: () => setUSelected(null) })
  );
};

// ── VALUE INVEST ANALYZER ─────────────────────────────────────
// 워렌 버핏 + 빌 애크먼 + 기술주 가치투자 기준 통합 분석기
const ValueInvestAnalyzer = ({ enriched = [], L }) => {
  const [viewMode, setViewMode] = useState(enriched.length > 0 ? "batch" : "single");
  const [ticker, setTicker] = useState("");
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  const analyze = async () => {
    if (!ticker.trim()) return;
    setLoading(true); setErr(""); setData(null);
    try {
      const raw = await fetchYF(ticker.trim().toUpperCase());
      const mapped = mapYFToStock(ticker.trim().toUpperCase(), raw, null);
      setData(mapped);
    } catch(e) { setErr("⚠️ " + e.message); }
    setLoading(false);
  };

  // ─── 스코어링 기준 ────────────────────────────────────────────
  const computeValueScore = (s) => {
    if (!s) return null;
    const checks = [];

    // 1. 워렌 버핏 기준
    checks.push({ cat: "Buffett", label: "ROE ≥ 15% (지속적 경쟁우위)", val: s.roe, pass: s.roe >= 15, tip: "ROE가 15% 이상이면 경쟁 해자(moat)가 있는 기업으로 판단" });
    checks.push({ cat: "Buffett", label: "D/E ≤ 0.5 (보수적 재무구조)", val: s.debtToEquity, pass: s.debtToEquity >= 0 && s.debtToEquity <= 0.5, tip: "부채/자기자본 0.5 이하: 재무건전성 우수" });
    checks.push({ cat: "Buffett", label: "Owner Earnings Yield ≥ 5%", val: s.ownerEarningsYield, pass: s.ownerEarningsYield >= 5, tip: "버핏의 핵심 지표: FCF×0.85÷시총. 5% 이상이면 매력적" });
    checks.push({ cat: "Buffett", label: "Gross Margin ≥ 40% (가격결정력)", val: s.grossMargin, pass: s.grossMargin >= 40, tip: "총이익률 40% 이상: 제품 가격결정력과 경제적 해자 존재" });
    checks.push({ cat: "Buffett", label: "FCF Yield ≥ 3%", val: s.fcfYield, pass: s.fcfYield >= 3, tip: "잉여현금흐름 수익률. 채권 대비 프리미엄 필요" });
